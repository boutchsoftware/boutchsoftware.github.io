<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Touché, c'est fait</title>
  <style>
    :root {
      --green:      #5BB65A;
      --text:       #212121;
      --muted:      #757575;
      --bg:         #F5FBF5;
      --radius:     14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .badge {
      font-size: 3rem;
      margin-bottom: 16px;
    }
    h1 { color: var(--green); font-size: 1.8rem; margin-bottom: 12px; }
    p { color: var(--muted); margin-bottom: 16px; max-width: 34em; }
    a.btn {
      display: inline-block;
      background: var(--green);
      color: #fff;
      text-decoration: none;
      padding: 14px 28px;
      border-radius: var(--radius);
      font-weight: 600;
      margin: 6px;
    }
  </style>
</head>
<body>
  <div class="badge">📍</div>
  <h1>Cette étiquette fonctionne avec «&nbsp;Touché, c'est fait&nbsp;»</h1>
  <p>
    Vous avez touché une étiquette de tâche. Pour enregistrer la tâche en une seconde,
    installez l'application, puis touchez à nouveau l'étiquette avec votre téléphone.
  </p>
  <p><em>L'application arrive bientôt sur Google Play.</em></p>
  <!-- À l'ouverture sur Play Store : remplacer le paragraphe ci-dessus par
       <a class="btn" href="https://play.google.com/store/apps/details?id=com.boutch.touchefait">Installer l'application</a> -->
</body>
</html>
