<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invitation — Touché, c'est fait</title>
  <style>
    :root{--green:#2E7D32;--text:#212121;--muted:#65706A;--bg:#F5FBF5}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;text-align:center;background:var(--bg);color:var(--text);font:17px/1.6 "Segoe UI",Arial,sans-serif}
    main{max-width:560px}.icon{font-size:3.5rem}h1{color:var(--green);line-height:1.25}p{color:var(--muted)}
  </style>
</head>
<body>
  <main>
    <div class="icon">🏠</div>
    <h1>Vous êtes invité dans un foyer « Touché, c'est fait »</h1>
    <p>Ouvrez ce lien sur un téléphone Android où l'application est installée. L'invitation est temporaire et expire après 15 minutes.</p>
    <p><strong>L'application arrive bientôt sur Google Play.</strong></p>
  </main>
</body>
</html>
