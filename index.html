<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BoutchSoftware</title>
  <style>
    :root {
      --green:      #5BB65A;
      --text:       #212121;
      --muted:      #757575;
      --bg:         #F5FBF5;
      --card:       #FFFFFF;
      --radius:     14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    h1 { color: var(--green); font-size: 2.2rem; margin-bottom: 12px; }
    p { color: var(--muted); margin-bottom: 24px; }
    a.btn {
      display: inline-block;
      background: var(--green);
      color: #fff;
      text-decoration: none;
      padding: 14px 28px;
      border-radius: var(--radius);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <h1>BoutchSoftware</h1>
  <p>Des applications simples, qui font une chose et la font bien.</p>
  <a class="btn" href="https://armen56k.github.io/boutch-pages/index.html">Voir nos applications</a>
</body>
</html>
